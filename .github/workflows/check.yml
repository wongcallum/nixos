name: Flake check

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false

      # crane's cleanCargoSource is an IFD path read during eval, which the
      # nix-daemon must substitute from calamari. extra-conf / cachix-action only
      # land in the *client* nix.conf; the daemon substitutes from /etc/nix/nix.conf
      # (that's why cache.nixos.org works but calamari didn't). Write it there and
      # restart the daemon so it's used just like cache.nixos.org.
      - name: trust calamari in the nix-daemon config
        run: |
          echo "extra-substituters = https://calamari.cachix.org" | sudo tee -a /etc/nix/nix.conf
          echo "extra-trusted-public-keys = calamari.cachix.org-1:EktyeEyKRL+4q0JC0ejzBBgjVE3gHEu2COnrp6qgvBQ=" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-check-v2-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-v2-
          # Restrict to the store + db only. The default ("/nix") also grabs the
          # Determinate installer's root-owned files, whose restore fails tar
          # (exit 2) and leaves paths registered-but-invalid -> "path is not
          # valid" for anything not also on cache.nixos.org (e.g. the crane
          # -source IFD path). Bumped prefix to -v2- to abandon poisoned caches.
          paths: |
            /nix/store
            /nix/var/nix/db/db.sqlite
            ~/.cache/nix
          purge: true
          purge-prefixes: nix-${{ runner.os }}-check-v2-
          purge-created: 0
          purge-last-accessed: 86400
          purge-primary-key: never

      - run: nix flake check --no-build --show-trace
