name: Flake check

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            extra-substituters = https://calamari.cachix.org
            extra-trusted-public-keys = calamari.cachix.org-1:EktyeEyKRL+4q0JC0ejzBBgjVE3gHEu2COnrp6qgvBQ=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-check-v2-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-v2-
          # Restrict to the store + db only. The default ("/nix") also grabs the
          # installer's root-owned files, whose restore fails tar (exit 2) and
          # leaves paths registered-but-invalid. -v2- abandons the poisoned caches.
          paths: |
            /nix/store
            /nix/var/nix/db/db.sqlite
            ~/.cache/nix
          purge: true
          purge-prefixes: nix-${{ runner.os }}-check-v2-
          purge-created: 0
          purge-last-accessed: 86400
          purge-primary-key: never

      # `nix flake check --no-build` does not substitute crane's IFD
      # cleanCargoSource output during eval (cache.nixos.org paths substitute, but
      # the calamari one does not, even with calamari trusted). Pull it from
      # calamari explicitly first so the findCargoFiles readDir finds it valid.
      # The path is per zed rev -- regenerate ci/zed-eval-source.txt when bumping
      # the zed input (see the push recipe in scripts / the project notes).
      - run: nix copy --from https://calamari.cachix.org "$(cat ci/zed-eval-source.txt)"

      - run: nix flake check --no-build --show-trace
