name: Flake check

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          # Upstream Nix (not Determinate): Determinate manages /etc/nix/nix.conf
          # itself and drops extra-conf, so the calamari substituter never reaches
          # the daemon that does IFD realisation. Upstream writes extra-conf to the
          # system nix.conf, so calamari is used just like cache.nixos.org.
          determinate: false
          extra-conf: |
            extra-substituters = https://calamari.cachix.org
            extra-trusted-public-keys = calamari.cachix.org-1:EktyeEyKRL+4q0JC0ejzBBgjVE3gHEu2COnrp6qgvBQ=

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-check-v2-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-v2-
          # Restrict to the store + db only. The default ("/nix") also grabs the
          # Determinate installer's root-owned files, whose restore fails tar
          # (exit 2) and leaves paths registered-but-invalid -> "path is not
          # valid" for anything not also on cache.nixos.org (e.g. the crane
          # -source IFD path). Bumped prefix to -v2- to abandon poisoned caches.
          paths: |
            /nix/store
            /nix/var/nix/db/db.sqlite
            ~/.cache/nix
          purge: true
          purge-prefixes: nix-${{ runner.os }}-check-v2-
          purge-created: 0
          purge-last-accessed: 86400
          purge-primary-key: never

      - name: debug substituters + prefetch zed eval source
        run: |
          echo "=== /etc/nix/nix.conf ==="; sudo cat /etc/nix/nix.conf 2>/dev/null || true
          echo "=== effective substituters ==="; nix config show 2>/dev/null | grep -iE "substituters|trusted-public" || true
          echo "=== calamari reachable? ==="; nix path-info --store https://calamari.cachix.org /nix/store/v1wijhc4p24hs15a2in8gr0pmyacws3p-source 2>&1 || echo CANNOT_REACH
          echo "=== copy eval source from calamari ==="; nix copy --from https://calamari.cachix.org /nix/store/v1wijhc4p24hs15a2in8gr0pmyacws3p-source 2>&1 && echo COPY_OK || echo COPY_FAIL

      - run: nix flake check --no-build --show-trace
