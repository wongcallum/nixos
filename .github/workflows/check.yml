name: Flake check

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-check-v2-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-v2-
          # Cache only the store + db. The default (`/nix`) also grabs the
          # Determinate installer's root-owned files (/nix/nix-installer,
          # /nix/receipt.json, /nix/var/determinate, /nix/var/log), which the
          # next run's installer re-creates first, so tar restore fails with
          # exit 2 and leaves store paths registered-but-invalid.
          paths: |
            /nix/store
            /nix/var/nix/db/db.sqlite
            ~/.cache/nix
            ~root/.cache/nix
          purge: true
          purge-prefixes: nix-${{ runner.os }}-check-v2-
          purge-created: 0
          purge-last-accessed: 86400
          purge-primary-key: never

      - run: nix flake check --no-build --show-trace
