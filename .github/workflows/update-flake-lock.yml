name: Update flake.lock

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SECRETS_DEPLOY_KEY }}

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Rebase patched nixpkgs
        env:
          GITHUB_TOKEN: ${{ secrets.NIXPKGS_PAT }}
        run: |
          nix flake update unstable-upstream
          nixpkgs_rev=$(nix flake metadata --json | jq -er '.locks.nodes."unstable-upstream".locked.rev')
          nix run nixpkgs#gh-cherry-pick -- \
            --target wongcallum/nixpkgs@patched \
            --first-hard-reset-to "NixOS/nixpkgs/$nixpkgs_rev" \
            wongcallum/nixpkgs/6532eb6b9d9afa0911e333ee197eb30d9716fdf9

      - uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pr-title: "chore: update flake.lock"
          pr-labels: |
            dependencies
            automated
          commit-msg: "chore: update flake.lock"
